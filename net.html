<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="core.css">
<style>
  .uc-node { display:inline-block; width:10px; height:10px; border-radius:50%;
    background:var(--accent); margin:6px; opacity:.5; cursor:pointer; transition:.3s; }
  .uc-node:hover { opacity:1; transform:scale(1.6); }
  #field { min-height:200px; padding:1.5rem; border:1px solid rgba(255,255,255,.1); margin-bottom:1.5rem; }
</style>
</head><body>
<main>
  <h1 id="heading"></h1>
  <div id="field"></div>
  <div id="detail" class="uc-card" style="display:none"></div>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="portal.config.js"></script>
<script src="core.js"></script>
<script>
  UC.mountField(); UC.mountNav("net"); UC.mountFooter();
  const C = UC.config, N = C.net;
  heading.textContent = N.heading;

  function render(nodes){
    if(!nodes.length){ field.innerHTML=`<span class="uc-muted">${N.emptyMsg}</span>`; return; }
    field.innerHTML="";
    nodes.forEach(n=>{
      const dot=document.createElement("span"); dot.className="uc-node";
      dot.onclick=()=>{ detail.style.display="block";
        detail.innerHTML=`<div class="uc-mono uc-muted" style="font-size:.62rem;margin-bottom:.6rem">шум</div>
          <div style="margin-bottom:1rem">${(n.raw_noise||"").replace(/</g,"&lt;")}</div>
          <div class="uc-mono uc-muted" style="font-size:.62rem;margin-bottom:.6rem">интерпретация</div>
          <div class="uc-muted">${(n.ai_interpretation||"—").replace(/</g,"&lt;")}</div>`; };
      field.appendChild(dot);
    });
  }

  (async ()=>{
    const db = await UC.initDb();
    if(!db){ // нет базы → демо-узлы, чтобы страница не была мёртвой
      render([{raw_noise:"Боюсь, что время уходит впустую.",ai_interpretation:"Сигнал резонирует с темой контроля. Страх потери времени — индикатор ценности. Что именно хочется успеть?"}]);
      return;
    }
    const { data, error } = await db.from("nodes").select("raw_noise,ai_interpretation").limit(200);
    render(error ? [] : (data||[]));
  })();
</script>
</body></html>
