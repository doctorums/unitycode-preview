     ⚙️  ВПИШИ СВОЁ при форке:
         • REPO_URL — ссылка на твой GitHub-репозиторий (кнопка «Форкнуть»).
     ⛔️ НЕ ТРОГАЙ: четыре пункта верхнего меню и имена файлов разделов.

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNITYCODE — Материалы</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Unbounded:wght@200;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; }
  main { flex: 1; max-width: 820px; width: 100%; margin: 0 auto; padding: 2.5rem 1.4rem 4rem; }
  h1 { font-family: 'Unbounded', sans-serif; font-weight: 200; font-size: 1.6rem;
       letter-spacing: 0.04em; margin: 0 0 0.6rem; }
  .lead { color: var(--dim); font-size: 0.85rem; margin: 0 0 2.5rem; line-height: 1.7; }

  /* Внутреннее меню раздела — расширяемые карточки */
  .mat-grid { display: grid; gap: 1rem; }
  .mat-card {
    display: block; text-align: left; width: 100%;
    border: 1px solid var(--border); background: var(--ai-bg);
    padding: 1.4rem 1.5rem; cursor: pointer; color: var(--white);
    font-family: 'Share Tech Mono', monospace; transition: border-color 0.2s, background 0.2s;
    text-decoration: none;
  }
  .mat-card:hover { border-color: var(--accent); background: var(--glow); }
  .mat-card .t { font-family: 'Unbounded', sans-serif; font-weight: 400; font-size: 1rem; }
  .mat-card .d { color: var(--dim); font-size: 0.78rem; margin-top: 0.4rem; line-height: 1.6; }
  .mat-card .arrow { float: right; color: var(--accent); }

  /* Встроенный читатель FORK.md */
  #reader { display: none; margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem; }
  #reader.show { display: block; }
  #reader h2 { font-family: 'Unbounded', sans-serif; font-weight: 400; font-size: 1.2rem; margin: 1.4rem 0 0.5rem; color: var(--accent); }
  #reader h3 { font-family: 'Unbounded', sans-serif; font-weight: 400; font-size: 0.95rem; margin: 1.1rem 0 0.4rem; }
  #reader p, #reader li { font-size: 0.85rem; line-height: 1.75; color: #ddd; }
  #reader code { background: rgba(255,255,255,0.06); padding: 0.1em 0.35em; border-radius: 3px; font-size: 0.8rem; }
  #reader table { border-collapse: collapse; width: 100%; margin: 1rem 0; font-size: 0.78rem; }
  #reader td, #reader th { border: 1px solid var(--border); padding: 0.5rem 0.7rem; text-align: left; }
  #reader hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
  .back { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: var(--dim);
          background: none; border: none; cursor: pointer; padding: 0; margin-bottom: 1rem; }
  .back:hover { color: var(--accent); }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">UNITYCODE // МАТЕРИАЛЫ</a>
  <nav>
    <a href="implant.html">Имплант</a>
    <a href="petlya.html">Спираль</a>
    <a href="set.html">Сеть</a>
    <a href="materials.html" class="active">Материалы</a>
  </nav>
</header>

<main>
  <h1>Материалы</h1>
  <p class="lead">Тексты, теория и устройство проекта. Раздел будет пополняться.</p>

  <div class="mat-grid" id="grid"></div>

  <div id="reader">
    <button class="back" onclick="closeReader()">← назад к материалам</button>
    <div id="readerBody"></div>
  </div>
</main>

<script>
  // ── Ссылка на твой репозиторий (кнопка «Форкнуть») ──────────────────────
  // ФОРКЕР: подставь свой репозиторий. Имя репо может отличаться от примера.
  const REPO_URL = "https://github.com/doctorums/unitycode"; // ← ПРОВЕРЬ/ЗАМЕНИ

  // ── ДОБАВИТЬ материал: впиши новую карточку в этот массив. ──────────────
  //   type:"link"   — открывает другую страницу (href)
  //   type:"reader" — показывает текст md-файла прямо здесь (src)
  //   type:"ext"    — внешняя ссылка в новой вкладке (href)
  const MATERIALS = [
    { type:"link",   title:"Книга",        desc:"«Бог, бесконечность и ты» — теория проекта от первоисточника до науки.", href:"kniga.html" },
    { type:"reader", title:"Как форкнуть", desc:"Что можно менять, что нельзя и почему. Несущая стена простыми словами.", src:"FORK.md" },
    { type:"ext",    title:"Форкнуть",     desc:"Сделать свой узел сети на GitHub.", href: REPO_URL },
  ];

  const grid = document.getElementById('grid');
  MATERIALS.forEach(m => {
    const el = document.createElement(m.type === 'reader' ? 'button' : 'a');
    el.className = 'mat-card';
    el.innerHTML = `<span class="arrow">→</span><div class="t">${m.title}</div><div class="d">${m.desc}</div>`;
    if (m.type === 'link')  { el.href = m.href; }
    if (m.type === 'ext')   { el.href = m.href; el.target = '_blank'; el.rel = 'noopener'; }
    if (m.type === 'reader'){ el.onclick = () => openReader(m.src, m.title); }
    grid.appendChild(el);
  });

  // ── Встроенный читатель .md (лёгкий рендер, без библиотек) ──────────────
  async function openReader(src, title) {
    const reader = document.getElementById('reader');
    const body = document.getElementById('readerBody');
    body.innerHTML = '<p class="d">Загрузка…</p>';
    reader.classList.add('show');
    reader.scrollIntoView({ behavior: 'smooth' });
    try {
      const res = await fetch(src);
      if (!res.ok) throw new Error(res.status);
      const md = await res.text();
      body.innerHTML = renderMarkdown(md);
    } catch (e) {
      body.innerHTML = `<p class="d">Не удалось загрузить ${src}. Открой файл в репозитории напрямую.</p>`;
    }
  }
  function closeReader() {
    document.getElementById('reader').classList.remove('show');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // Минимальный markdown→HTML: заголовки, списки, таблицы, code, hr, жирный.
  function renderMarkdown(md) {
    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const lines = md.split('\n');
    let html = '', inList = false, inTable = false;
    const closeList = () => { if (inList) { html += '</ul>'; inList = false; } };
    const closeTable = () => { if (inTable) { html += '</table>'; inTable = false; } };
    const inline = t => esc(t)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" style="color:var(--accent)">$1</a>');
    for (let raw of lines) {
      const line = raw.replace(/\s+$/,'');
      if (/^\s*$/.test(line)) { closeList(); closeTable(); continue; }
      if (/^#\s/.test(line))  { closeList(); closeTable(); html += '<h1 style="display:none"></h1>'; continue; } // title скрыт — он есть в шапке
      if (/^##\s/.test(line)) { closeList(); closeTable(); html += '<h2>'+inline(line.replace(/^##\s/,''))+'</h2>'; continue; }
      if (/^###\s/.test(line)){ closeList(); closeTable(); html += '<h3>'+inline(line.replace(/^###\s/,''))+'</h3>'; continue; }
      if (/^---+$/.test(line)){ closeList(); closeTable(); html += '<hr>'; continue; }
      if (/^\|/.test(line)) {
        if (/^\|[\s:|-]+\|?\s*$/.test(line)) continue; // строка-разделитель таблицы
        const cells = line.split('|').slice(1,-1).map(c => '<td>'+inline(c.trim())+'</td>').join('');
        if (!inTable) { html += '<table>'; inTable = true; }
        html += '<tr>'+cells+'</tr>'; continue;
      } else closeTable();
      if (/^\s*[-*]\s/.test(line)) {
        if (!inList) { html += '<ul>'; inList = true; }
        html += '<li>'+inline(line.replace(/^\s*[-*]\s/,''))+'</li>'; continue;
      } else closeList();
      html += '<p>'+inline(line)+'</p>';
    }
    closeList(); closeTable();
    return html;
  }
</script>
</body>
</html>
