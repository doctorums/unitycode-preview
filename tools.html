<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="core.css">
</head><body>
<main>
  <h1 id="heading"></h1>
  <div id="cards"></div>
  <div id="toast" class="uc-mono" style="position:fixed;left:50%;bottom:2rem;transform:translateX(-50%);background:var(--accent);color:var(--bg);padding:.8rem 1.4rem;opacity:0;transition:.3s;pointer-events:none;z-index:5">Скопировано</div>
</main>
<script src="portal.config.js"></script>
<script src="core.js"></script>
<script>
  UC.mountField(); UC.mountNav("tools"); UC.mountFooter();
  const C = UC.config;
  heading.textContent = C.tools.heading;
  cards.innerHTML = C.tools.cards.map((c,i)=>`
    <div class="uc-card">
      <h2 style="font-family:var(--font-display);font-weight:400;margin:0 0 .6rem">${c.title}</h2>
      <p class="uc-muted" style="margin:0 0 1.2rem">${c.desc}</p>
      <pre class="uc-mono" style="white-space:pre-wrap;background:rgba(0,0,0,.4);padding:1rem;border-left:2px solid var(--accent);margin:0 0 1.2rem">${c.copy.replace(/</g,"&lt;")}</pre>
      <button data-i="${i}">Скопировать</button>
    </div>`).join("");
  cards.addEventListener("click", e=>{
    const b=e.target.closest("button"); if(!b) return;
    navigator.clipboard.writeText(C.tools.cards[b.dataset.i].copy);
    toast.style.opacity=1; setTimeout(()=>toast.style.opacity=0,1600);
  });
</script>
</body></html>
