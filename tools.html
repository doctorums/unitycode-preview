<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="core.css">
<style>
  .uc-metrics { display:flex; gap:2.5rem; flex-wrap:wrap; margin:1.5rem 0 2rem; }
  .uc-metric .n { font-family:var(--font-display); font-size:2.4rem; line-height:1; }
  .uc-metric .l { font-family:var(--font-mono); font-size:.6rem; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); }
  .uc-scopes { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1.5rem; }
  .uc-block h3 { font-family:var(--font-mono); font-size:.7rem; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); margin:1.5rem 0 .5rem; }
  button:disabled { opacity:.35; cursor:not-allowed; }
</style>
</head><body>
<main>
  <h1 id="heading"></h1>
  <p id="intro" class="uc-muted"></p>
  <div class="uc-metrics" id="metrics"></div>
  <div class="uc-scopes" id="scopes"></div>
  <div id="status" class="uc-mono uc-muted" style="font-size:.7rem;min-height:1.2em"></div>
  <div id="result"></div>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="portal.config.js"></script>
<script src="core.js"></script>
<script>
  UC.mountField(); UC.mountNav("tools"); UC.mountFooter();
  const C = UC.config, T = C.tools;
  const AN = (C.backend.workers && C.backend.workers.analyzer) || "";
  heading.textContent = T.heading;
  intro.textContent   = T.intro;

  // Кнопки областей анализа (выключенные — серые, неактивные)
  scopes.innerHTML = T.scopes.map(s =>
    `<button data-scope="${s.key}" ${s.enabled?"":"disabled"}>${s.label}</button>`).join("");

  let graph = { nodes: [], connections: [], participants: 0 };

  function renderMetrics(){
    metrics.innerHTML = `
      <div class="uc-metric"><div class="n">${graph.nodes.length}</div><div class="l">${T.metrics.nodes}</div></div>
      <div class="uc-metric"><div class="n">${graph.connections.length}</div><div class="l">${T.metrics.connections}</div></div>
      <div class="uc-metric"><div class="n">${graph.participants}</div><div class="l">${T.metrics.participants}</div></div>`;
  }

  function renderResult(res){
    const B = T.blocks;
    result.innerHTML = `
      <div class="uc-card uc-block">
        <h3>${B.patterns}</h3><div>${(res.patterns||"—").replace(/</g,"&lt;")}</div>
        <h3>${B.resonances}</h3><div>${(res.resonances||"—").replace(/</g,"&lt;")}</div>
        <h3>${B.ruptures}</h3><div>${(res.ruptures||"—").replace(/</g,"&lt;")}</div>
        <h3>${B.question}</h3><div>${(res.question||"—").replace(/</g,"&lt;")}</div>
      </div>`;
  }

  // Аналитик может вернуть либо 4 поля, либо единый текст interpretation.
  // Если единый текст — показываем его в блоке "Паттерны" целиком (фолбэк).
  function normalize(j){
    if (j.patterns || j.resonances || j.ruptures || j.question) return j;
    if (j.interpretation) return { patterns: j.interpretation, resonances:"", ruptures:"", question:"" };
    return T.demoResult;
  }

  // Контракт аналитика (Имплант): POST { scope, nodes, connections } -> { interpretation | 4 блока }
  async function analyze(scope){
    if (!AN) { renderResult(T.demoResult); status.textContent="демо-режим: аналитик не подключён"; return; }
    status.textContent = "// анализ…";
    const payload = { scope, nodes: graph.nodes, connections: graph.connections };
    const r = await fetch(AN, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload) });
    const j = await r.json();
    renderResult(normalize(j));
    status.textContent = "";
  }

  scopes.addEventListener("click", e=>{
    const b=e.target.closest("button"); if(!b||b.disabled) return;
    analyze(b.dataset.scope).catch(err=>status.textContent="сбой связи: "+err.message);
  });

  // Загрузка графа из базы (или демо-цифры, если базы нет)
  (async ()=>{
    const db = await UC.initDb();
    if(!db){ graph={nodes:[{raw_noise:"демо"}],connections:[],participants:1}; renderMetrics(); return; }
    const [{data:nodes}, {data:conns}] = await Promise.all([
      db.from("nodes").select("raw_noise,ai_interpretation").limit(200),
      db.from("connections").select("id").limit(500),
    ]);
    graph.nodes = nodes||[]; graph.connections = conns||[]; graph.participants = 1;
    renderMetrics();
  })();
</script>
</body></html>
