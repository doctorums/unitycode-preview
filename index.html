<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="core.css">
</head><body>
<main style="display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;min-height:75vh">
  <div id="tagline" class="uc-mono uc-muted" style="letter-spacing:.3em;margin-bottom:2.5rem"></div>
  <h1 id="question" style="max-width:18ch"></h1>
  <button id="enter"></button>
</main>
<script src="portal.config.js"></script>
<script src="core.js"></script>
<script>
  // Порог входа. Если человек уже был внутри — не показываем дверь, сразу пускаем.
  if (!UC.guardEntry()) {
    UC.mountField(); UC.mountFooter();   // НЕ mountNav: вход — не пункт меню
    const C = UC.config;
    tagline.textContent  = C.identity.tagline;
    question.textContent = C.entry.question;
    enter.textContent    = C.entry.button;
    enter.addEventListener("click", () => UC.enterPortal());
  }
</script>
</body></html>
