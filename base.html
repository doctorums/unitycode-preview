<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="core.css">
</head><body>
<main>
  <h1 id="heading"></h1>
  <blockquote id="manifesto" style="font-family:var(--font-display);font-size:1.4rem;font-style:italic;border-left:2px solid var(--accent);padding-left:1.4rem;margin:0 0 3rem;color:var(--fg)"></blockquote>
  <div id="acc"></div>
  <p style="margin-top:3rem"><a href="fork.html">→ Размножить портал (форк)</a></p>
</main>
<script src="portal.config.js"></script>
<script src="core.js"></script>
<script>
  UC.mountField(); UC.mountNav("base"); UC.mountFooter();
  const C = UC.config, B = C.base;
  heading.textContent = B.heading;
  manifesto.textContent = B.manifesto;
  acc.innerHTML = B.sections.map(s=>`
    <div class="uc-card" style="cursor:pointer">
      <div style="display:flex;justify-content:space-between" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='block'?'none':'block'">
        <span style="font-family:var(--font-display);font-size:1.15rem">${s.q}</span><span class="uc-muted">+</span>
      </div>
      <div class="uc-muted" style="display:none;margin-top:1rem">${s.a}</div>
    </div>`).join("");
</script>
</body></html>
