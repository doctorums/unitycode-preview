<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Unbounded:wght@200;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  html,body { height:100%; margin:0; }
  body { min-height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  #sky { position:fixed; inset:0; z-index:0; pointer-events:none; touch-action:none; }
  header { position:relative; z-index:3; }
  main { position:relative; z-index:2; flex:1; width:100%; max-width:820px;
         margin:0 auto; padding:2.5rem 9rem 4rem 1.4rem; overflow-y:auto; }
  .menu { position:fixed; top:5rem; right:1rem; display:flex; flex-direction:column; gap:0.5rem; z-index:10;
          transform:translateZ(0); will-change:transform; pointer-events:auto; }
  .menu button, .menu a {
    background:rgba(0,0,0,0.72); color:#888; border:1px solid rgba(255,255,255,0.08);
    padding:0.5rem 0.9rem; font-family:'Share Tech Mono',monospace;
    font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase;
    cursor:pointer; text-decoration:none; display:inline-block;
    -webkit-tap-highlight-color:rgba(255,255,255,0.1);
  }
  #reader { word-break:break-word; overflow-wrap:break-word; box-sizing:border-box; width:calc(100% - 2rem);
    display:none; max-width:680px; padding:24px;
    background: radial-gradient(ellipse at center, rgba(10,18,32,0.42) 0%, rgba(10,18,32,0.294) 60%, rgba(10,18,32,0) 100%);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  #reader.show { display:block; }
</style>
</head><body>

<canvas id="sky"></canvas>

<header>
  <a href="index.html" class="logo">UNITYCODE // ТЕСТ 8</a>
  <nav>
    <a href="implant.html">Имплант</a>
    <a href="petlya.html">Спираль</a>
    <a href="set.html">Сеть</a>
    <a href="materials.html" class="active">Материалы</a>
  </nav>
</header>

<main>
  <div class="menu" id="menu"></div>
  <div id="reader"><div id="readerBody"></div></div>
</main>

<script>
  // ТОЧНАЯ КОПИЯ ЛОГИКИ ИЗ МАТЕРИАЛОВ — с fetch FORK.md
  const items = [
    { id:"book", type:"link", title:"Книга", href:"#" },
    { id:"fork", type:"reader", title:"Как форкнуть", src:"FORK.md" },
    { id:"repo", type:"ext", title:"Форкнуть", href:"#" },
  ];
  const reader = document.getElementById('reader');
  const readerBody = document.getElementById('readerBody');
  let openId = null;

  items.forEach(m => {
    const el = document.createElement(m.type==='reader' ? 'button' : 'a');
    el.textContent = m.title;
    if (m.type==='link' || m.type==='ext') el.href = m.href;
    if (m.type==='reader') el.onclick = () => toggle(m);
    document.getElementById('menu').appendChild(el);
  });

  function toggle(m){
    if (openId===m.id) { reader.classList.remove('show'); openId=null; }
    else openReader(m);
  }
  async function openReader(m){
    openId = m.id;
    reader.classList.add('show');
    readerBody.innerHTML = '<p>Загрузка…</p>';
    try {
      const res = await fetch(m.src);
      if (!res.ok) throw 0;
      readerBody.innerHTML = '<pre style="white-space:pre-wrap">'+(await res.text()).replace(/</g,'&lt;')+'</pre>';
    } catch(e) { readerBody.innerHTML = '<p>Не удалось загрузить</p>'; }
  }

  const cv=document.getElementById('sky'), ctx=cv.getContext('2d');
  let W,H,stars;
  function init(){ W=cv.width=innerWidth; H=cv.height=innerHeight;
    stars=Array.from({length:200},()=>({x:Math.random()*W,y:Math.random()*H,a:0.3+Math.random()*0.5,ph:Math.random()*7})); }
  function loop(t){
    ctx.fillStyle='#050a14'; ctx.fillRect(0,0,W,H);
    for(const s of stars){ const tw=0.4+0.6*Math.sin(t/1000+s.ph);
      ctx.fillStyle='rgba(220,235,255,'+(s.a*tw).toFixed(3)+')'; ctx.fillRect(s.x,s.y,1,1); }
    requestAnimationFrame(loop);
  }
  addEventListener('resize',init); init(); requestAnimationFrame(loop);
</script>
</body></html>
