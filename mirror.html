<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="core.css">
</head><body>
<main>
  <h1 id="heading"></h1>
  <div id="log" style="margin-bottom:1.5rem"></div>
  <textarea id="input" rows="4"></textarea>
  <div style="display:flex;gap:1rem;margin-top:1rem;flex-wrap:wrap;align-items:center">
    <button id="send"></button>
    <span id="mode" class="uc-mono uc-muted" style="font-size:.62rem"></span>
  </div>
</main>
<script src="portal.config.js"></script>
<script src="core.js"></script>
<script>
  UC.mountField(); UC.mountNav("mirror"); UC.mountFooter();
  const C = UC.config, M = C.mirror;
  const GEN = (C.backend.workers && C.backend.workers.generator) || "";
  heading.textContent = M.heading;
  input.placeholder   = M.placeholder;
  send.textContent    = M.button;
  document.getElementById("mode").textContent = GEN ? "генератор подключён" : "демо-режим";

  let demoIdx = 0;
  function addLine(who, text){
    const d=document.createElement("div"); d.className="uc-card";
    d.innerHTML=`<div class="uc-mono uc-muted" style="font-size:.62rem;margin-bottom:.5rem">${who}</div>${text.replace(/</g,"&lt;")}`;
    log.appendChild(d); d.scrollIntoView({behavior:"smooth",block:"end"});
  }

  // Контракт генератора (Спираль): POST { raw_noise } -> { interpretation }
  async function generate(noise){
    if (!GEN) return M.demoReplies[demoIdx++ % M.demoReplies.length];
    const r = await fetch(GEN, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ raw_noise: noise })
    });
    const j = await r.json();
    return j.interpretation || "(узел промолчал)";
  }

  send.addEventListener("click", async ()=>{
    const noise = input.value.trim(); if(!noise) return;
    addLine("сигнал", noise); input.value=""; send.disabled=true;
    let reply="";
    try { reply = await generate(noise); addLine("узел", reply); }
    catch(e){ addLine("узел", "сбой связи: " + e.message); send.disabled=false; return; }
    send.disabled=false;
    // Сохранение узла в Сеть, если база подключена.
    try {
      const db = await UC.initDb();
      if (db) await db.from("nodes").insert({ raw_noise: noise, ai_interpretation: reply, node_origin: C.identity.nodeLabel });
    } catch(e) { console.warn("Узел не сохранён в базу:", e.message); }
  });
</script>
</body></html>
