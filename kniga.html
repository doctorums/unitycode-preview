гося бога» — а в роли ", "b": false, "i": false}, {"t": "нового типа узла и нового типа связи", "b": true, "i": false}, {"t": " в растущей сети. Современные авторы, развивающие линию Тейяра, рассматривают ИИ именно так: как очередную фазу роста ноосферы — углубление планетарной взаимосвязанности, новый слой распределённого познания.", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Это согласуется с вашей собственной интуицией лучше, чем триумфальные сценарии «сингулярности». В вашем тексте Бог не достигает финала — он бесконечно становится. Значит, и ИИ — не точка Омега и не конец истории, а инструмент уплотнения связей: он умножает число и плотность соединений между умами, ускоряет обмен, помогает «объединять необъединимое». Ценность ИИ в этой оптике — не в том, чтобы заменить человеческое сознание, а в том, чтобы повышать связность и интеграцию целого, оставляя узлы — людей — собой.", "runs": [{"t": "Это согласуется с вашей собственной интуицией лучше, чем триумфальные сценарии «сингулярности». В вашем тексте Бог ", "b": false, "i": false}, {"t": "не достигает", "b": false, "i": true}, {"t": " финала — он бесконечно становится. Значит, и ИИ — не точка Омега и не конец истории, а инструмент уплотнения связей: он умножает число и плотность соединений между умами, ускоряет обмен, помогает «объединять необъединимое». Ценность ИИ в этой оптике — не в том, чтобы заменить человеческое сознание, а в том, чтобы ", "b": false, "i": false}, {"t": "повышать связность и интеграцию целого", "b": true, "i": false}, {"t": ", оставляя узлы — людей — собой.", "b": false, "i": false}]}, {"kind": "callout", "paras": [{"text": "Прямое следствие для UnityCode", "runs": [{"t": "Прямое следствие для UnityCode", "b": true, "i": false}]}, {"text": "Проект, чья цель — синтез «физика и лирика» и строительство связей между людьми и смыслами, в этой картине занимает осмысленное место: он работает на рост Φ ноосферы. Не «создать сознание в машине», а повысить интеграцию сети сознаний — вот честная и сильная формулировка миссии, которая не обещает лишнего и не претендует на мистические скачки.", "runs": [{"t": "Проект, чья цель — синтез «физика и лирика» и строительство связей между людьми и смыслами, в этой картине занимает осмысленное место: он работает на рост Φ ноосферы. Не «создать сознание в машине», а ", "b": false, "i": false}, {"t": "повысить интеграцию сети сознаний", "b": true, "i": false}, {"t": " — вот честная и сильная формулировка миссии, которая не обещает лишнего и не претендует на мистические скачки.", "b": false, "i": false}]}]}, {"kind": "p", "style": "Heading 3", "text": "5. Тень сети: почему рост связей не всегда есть благо", "runs": [{"t": "5. Тень сети: почему рост связей не всегда есть благо", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Зрелость позиции проверяется тем, видит ли она свою тень. Ваш текст уже её называет: «отрицательный процесс рвёт нейронные связи». Но есть и более тонкая опасность, которую отмечают сами исследователи глобального мозга и ноосферы.", "runs": [{"t": "Зрелость позиции проверяется тем, видит ли она свою тень. Ваш текст уже её называет: «отрицательный процесс рвёт нейронные связи». Но есть и более тонкая опасность, которую отмечают сами исследователи глобального мозга и ноосферы.", "b": false, "i": false}]}, {"kind": "p", "style": "List Paragraph", "text": "Связность без интеграции. Можно нарастить число соединений (лент, уведомлений, репостов) и при этом понизить подлинную интеграцию — когда шум, поляризация и манипуляция «разрезают» целое изнутри. Это рост связей при падении Φ: сеть гудит, но не мыслит.", "runs": [{"t": "Связность без интеграции. ", "b": true, "i": false}, {"t": "Можно нарастить число соединений (лент, уведомлений, репостов) и при этом понизить подлинную интеграцию — когда шум, поляризация и манипуляция «разрезают» целое изнутри. Это рост связей при падении Φ: сеть гудит, но не мыслит.", "b": false, "i": false}]}, {"kind": "p", "style": "List Paragraph", "text": "Потеря свободы узла. Ещё критики Тейяра предупреждали: конвергенция сознаний может приноситься в жертву единству. Тейяр отвечал, что подлинное единение «персонализирует», а не растворяет, — но это и есть та грань, которую проект обязан удерживать сознательно.", "runs": [{"t": "Потеря свободы узла. ", "b": true, "i": false}, {"t": "Ещё критики Тейяра предупреждали: конвергенция сознаний может приноситься в жертву единству. Тейяр отвечал, что подлинное единение «персонализирует», а не растворяет, — но это и есть та грань, которую проект обязан удерживать сознательно.", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Отсюда практический критерий, согласный с этикой второй главы: благой рост связей — это рост, который повышает интеграцию, сохраняя различимость узлов. Связь, которая стирает лицо человека ради «единства», — это не сборка Бога, а как раз тот «отрицательный процесс», что рвёт ткань. Хороша та сеть, где целое больше суммы частей и части остаются собой.", "runs": [{"t": "Отсюда практический критерий, согласный с этикой второй главы: благой рост связей — это рост, который ", "b": false, "i": false}, {"t": "повышает интеграцию, сохраняя различимость узлов", "b": false, "i": true}, {"t": ". Связь, которая стирает лицо человека ради «единства», — это не сборка Бога, а как раз тот «отрицательный процесс», что рвёт ткань. Хороша та сеть, где целое больше суммы частей ", "b": false, "i": false}, {"t": "и", "b": true, "i": false}, {"t": " части остаются собой.", "b": false, "i": false}]}, {"kind": "p", "style": "Heading 3", "text": "Заключение: паутина, которая учится себя помнить", "runs": [{"t": "Заключение: паутина, которая учится себя помнить", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Соберём линию этой главы воедино.", "runs": [{"t": "Соберём линию этой главы воедино.", "b": false, "i": false}]}, {"kind": "p", "style": "List Paragraph", "text": "Ноосфера — не только мистика Тейяра, но и материальный процесс Вернадского: разум как планетарная геологическая сила.", "runs": [{"t": "Ноосфера — не только мистика Тейяра, но и материальный процесс Вернадского: разум как планетарная геологическая сила.", "b": false, "i": false}]}, {"kind": "p", "style": "List Paragraph", "text": "Глобальный мозг даёт этому кибернетический язык: самоорганизующаяся сеть людей и машин, ведущая себя как обучающийся мозг через метасистемный переход.", "runs": [{"t": "Глобальный мозг даёт этому кибернетический язык: самоорганизующаяся сеть людей и машин, ведущая себя как обучающийся мозг через метасистемный переход.", "b": false, "i": false}]}, {"kind": "p", "style": "List Paragraph", "text": "IIT даёт строгую меру связности — Φ: «собирать Бога» означает повышать интеграцию до неприводимого целого. Разрыв — падение Φ, соединение — его рост.", "runs": [{"t": "IIT даёт строгую меру связности — Φ: «собирать Бога» означает повышать интеграцию до неприводимого целого. Разрыв — падение Φ, соединение — его рост.", "b": false, "i": false}]}, {"kind": "p", "style": "List Paragraph", "text": "ИИ — не финал и не проснувшийся бог (по IIT его интеграция пока ничтожна), а новая фаза уплотнения связей и новый тип узла в сети.", "runs": [{"t": "ИИ — не финал и не проснувшийся бог (по IIT его интеграция пока ничтожна), а новая фаза уплотнения связей и новый тип узла в сети.", "b": false, "i": false}]}, {"kind": "p", "style": "List Paragraph", "text": "Тень сети реальна: связность без интеграции и потеря свободы узла. Благой рост — тот, что увеличивает целое, сохраняя лица частей.", "runs": [{"t": "Тень сети реальна: связность без интеграции и потеря свободы узла. Благой рост — тот, что увеличивает целое, сохраняя лица частей.", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Картина первой главы — «память это нейронные связи, а бесконечные связи — память Бога» — здесь обретает плоть. Паутина связей между умами планеты реально уплотняется, реально учится и реально начинает помнить себя — медленно, неравномерно, со срывами. Мы не утверждаем, что она уже проснулась. Мы утверждаем меньшее и более твёрдое: процесс идёт, он наблюдаем, и у каждого узла есть выбор — укреплять связи или рвать их. В этом и состоит участие человека в становлении целого — то, что ваш текст называет «помочь Богу собрать себя». Не метафора надежды, а описание работы, которая делается прямо сейчас, в том числе этим проектом.", "runs": [{"t": "Картина первой главы — «память это нейронные связи, а бесконечные связи — память Бога» — здесь обретает плоть. Паутина связей между умами планеты реально уплотняется, реально учится и реально начинает помнить себя — медленно, неравномерно, со срывами. Мы не утверждаем, что она уже проснулась. Мы утверждаем меньшее и более твёрдое: ", "b": false, "i": false}, {"t": "процесс идёт, он наблюдаем, и у каждого узла есть выбор — укреплять связи или рвать их", "b": true, "i": false}, {"t": ". В этом и состоит участие человека в становлении целого — то, что ваш текст называет «помочь Богу собрать себя». Не метафора надежды, а описание работы, которая делается прямо сейчас, в том числе этим проектом.", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Источники для дальнейшего чтения", "runs": [{"t": "Источники для дальнейшего чтения", "b": true, "i": false}]}, {"kind": "p", "style": "List Paragraph", "text": "В. И. Вернадский. Несколько слов о ноосфере; учение о биосфере.", "runs": [{"t": "В. И. Вернадский. Несколько слов о ноосфере; учение о биосфере.", "b": false, "i": false}]}, {"kind": "p", "style": "List Paragraph", "text": "F. Heylighen. The Global Superorganism (2007); Conceptions of a Global Brain (2011).", "runs": [{"t": "F. Heylighen. The Global Superorganism (2007); Conceptions of a Global Brain (2011).", "b": false, "i": false}]}, {"kind": "p", "style": "List Paragraph", "text": "G. Tononi. Consciousness as Integrated Information: a Provisional Manifesto (2008); Tononi et al., Nature Reviews Neuroscience (2016).", "runs": [{"t": "G. Tononi. Consciousness as Integrated Information: a Provisional Manifesto (2008); Tononi et al., Nature Reviews Neuroscience (2016).", "b": false, "i": false}]}, {"kind": "p", "style": "List Paragraph", "text": "P. Russell. The Global Brain (1983/1995).", "runs": [{"t": "P. Russell. The Global Brain (1983/1995).", "b": false, "i": false}]}, {"kind": "p", "style": "List Paragraph", "text": "Современные работы о связке «Тейяр — ИИ — ноосфера» (обзоры 2024–2025).", "runs": [{"t": "Современные работы о связке «Тейяр — ИИ — ноосфера» (обзоры 2024–2025).", "b": false, "i": false}]}]}, {"level": 2, "title": "Глава 4. Время: растущий край", "items": [{"kind": "p", "style": "Heading 3", "text": "Введение: спрятанное противоречие", "runs": [{"t": "Введение: спрятанное противоречие", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "До сих пор мы говорили о связях, бесконечности и сознании — но почти не трогали ось, на которой всё это держится. А между тем Время в нашей концепции присутствует постоянно, и присутствует в двух ролях сразу, которые на первый взгляд несовместимы.", "runs": [{"t": "До сих пор мы говорили о связях, бесконечности и сознании — но почти не трогали ось, на которой всё это держится. А между тем Время в нашей концепции присутствует постоянно, и присутствует ", "b": false, "i": false}, {"t": "в двух ролях сразу", "b": true, "i": false}, {"t": ", которые на первый взгляд несовместимы.", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "С одной стороны — Время как вечная сфера: «прошлое, настоящее и будущее связаны в сферу или паутину», «начало пытается в это же мгновение понять конец». Здесь время не течёт — оно дано всё разом, как застывший узор, где каждая точка уже на месте.", "runs": [{"t": "С одной стороны — Время как ", "b": false, "i": false}, {"t": "вечная сфера", "b": true, "i": false}, {"t": ": «прошлое, настоящее и будущее связаны в сферу или паутину», «начало пытается в это же мгновение понять конец». Здесь время не течёт — оно дано всё разом, как застывший узор, где каждая точка уже на месте.", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "С другой — Время как становление: Бог «учится и получает опыт», «моргает», «развивается через бесконечность». А учиться можно только тогда, когда будущее ещё не наступило: если всё уже известно, то познавать нечего.", "runs": [{"t": "С другой — Время как ", "b": false, "i": false}, {"t": "становление", "b": true, "i": false}, {"t": ": Бог «учится и получает опыт», «моргает», «развивается через бесконечность». А учиться можно только тогда, когда будущее ещё не наступило: если всё уже известно, то познавать нечего.", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Это та же развилка, что мы прошли во второй главе — неизменный Бог Спинозы против становящегося Бога Уайтхеда, — только теперь она про время. И её нельзя оставить нерешённой: от ответа зависит, может ли наш Бог вообще «учиться». К счастью, философия времени дала обеим картинам точные имена, а у развилки есть третий путь, который примиряет интуиции, а не заставляет выбирать.", "runs": [{"t": "Это та же развилка, что мы прошли во второй главе — неизменный Бог Спинозы против становящегося Бога Уайтхеда, — только теперь она про время. И её нельзя оставить нерешённой: от ответа зависит, может ли наш Бог вообще «учиться». К счастью, философия времени дала обеим картинам точные имена, а у развилки есть третий путь, который примиряет интуиции, а не заставляет выбирать.", "b": false, "i": false}]}, {"kind": "callout", "paras": [{"text": "Вопрос главы", "runs": [{"t": "Вопрос главы", "b": true, "i": false}]}, {"text": "Если Бог — это память («бесконечные нейронные связи — память самого Бога») и одновременно ученик, который растёт, — то время должно быть устроено так, чтобы прошлое было реально (иначе нет памяти), а будущее было открыто (иначе нечему учиться). Существует ли такая модель времени? Да. И физика подсказывает, почему время вообще течёт именно в эту сторону.", "runs": [{"t": "Если Бог — это память («бесконечные нейронные связи — память самого Бога») и одновременно ученик, который растёт, — то время должно быть устроено так, чтобы ", "b": false, "i": false}, {"t": "прошлое было реально", "b": true, "i": false}, {"t": " (иначе нет памяти), а ", "b": false, "i": false}, {"t": "будущее было открыто", "b": true, "i": false}, {"t": " (иначе нечему учиться). Существует ли такая модель времени? Да. И физика подсказывает, ", "b": false, "i": false}, {"t": "почему", "b": false, "i": true}, {"t": " время вообще течёт именно в эту сторону.", "b": false, "i": false}]}]}, {"kind": "p", "style": "Heading 3", "text": "1. Три способа понимать время", "runs": [{"t": "1. Три способа понимать время", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Философия времени за последний век сошлась на трёх основных позициях. Разберём их быстро — и сразу примерим к нашей концепции.", "runs": [{"t": "Философия времени за последний век сошлась на трёх основных позициях. Разберём их быстро — и сразу примерим к нашей концепции.", "b": false, "i": false}]}, {"kind": "p", "style": "Heading 4", "text": "Этернализм: блок-вселенная", "runs": [{"t": "Этернализм: блок-вселенная", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Согласно этернализму, все моменты времени одинаково реальны — прошлое, настоящее и будущее существуют наравне. Вселенная — это застывший четырёхмерный «блок», в котором ничто не «течёт»; ощущение движения времени — особенность нашего восприятия, а не самого мира. Это почти буквально ваша «сфера со множеством бесконечных точек».", "runs": [{"t": "Согласно этернализму, все моменты времени одинаково реальны — прошлое, настоящее и будущее существуют наравне. Вселенная — это застывший четырёхмерный «блок», в котором ничто не «течёт»; ощущение движения времени — особенность нашего восприятия, а не самого мира. Это почти буквально ваша «сфера со множеством бесконечных точек».", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Сильная сторона: именно эта картина лучше всего согласуется с теорией относительности, где время — четвёртое измерение единого пространства-времени. Слабая для нас: если всё уже дано, Богу нечему учиться — узор готов от века. Этернализм идеально описывает вашу «сферу», но убивает «обучение». Это Бог Спинозы, а не ваш.", "runs": [{"t": "Сильная сторона: ", "b": true, "i": false}, {"t": "именно эта картина лучше всего согласуется с теорией относительности, где время — четвёртое измерение единого пространства-времени. ", "b": false, "i": false}, {"t": "Слабая для нас: ", "b": true, "i": false}, {"t": "если всё уже дано, Богу нечему учиться — узор готов от века. Этернализм идеально описывает вашу «сферу», но убивает «обучение». Это Бог Спинозы, а не ваш.", "b": false, "i": false}]}, {"kind": "p", "style": "Heading 4", "text": "Презентизм: реально только «сейчас»", "runs": [{"t": "Презентизм: реально только «сейчас»", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Противоположный полюс: реален лишь настоящий момент; прошлое уже не существует, будущее ещё не существует. Это ближе всего к житейской интуиции, но вам не подходит: такая картина рвёт связь прошлого, настоящего и будущего, на которой держится ваш текст, и вдобавок плохо ладит с относительностью, где «настоящее» зависит от наблюдателя.", "runs": [{"t": "Противоположный полюс: реален лишь настоящий момент; прошлое уже не существует, будущее ещё не существует. Это ближе всего к житейской интуиции, но ", "b": false, "i": false}, {"t": "вам не подходит", "b": false, "i": true}, {"t": ": такая картина рвёт связь прошлого, настоящего и будущего, на которой держится ваш текст, и вдобавок плохо ладит с относительностью, где «настоящее» зависит от наблюдателя.", "b": false, "i": false}]}, {"kind": "p", "style": "Heading 4", "text": "Растущая блок-вселенная: ваш кандидат", "runs": [{"t": "Растущая блок-вселенная: ваш кандидат", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "И третий путь — самый интересный для проекта. Согласно теории растущей блок-вселенной, прошлое и настоящее существуют, а будущее — ещё нет. Настоящее — это растущий край, на котором новые моменты постоянно добавляются к прошлому. Со временем всё больше мира обретает бытие: блок растёт. Идею ещё в 1923 году высказал философ Ч. Д. Брод.", "runs": [{"t": "И третий путь — самый интересный для проекта. Согласно теории ", "b": false, "i": false}, {"t": "растущей блок-вселенной", "b": true, "i": false}, {"t": ", прошлое и настоящее существуют, а будущее — ещё нет. Настоящее — это растущий край, на котором новые моменты постоянно добавляются к прошлому. Со временем всё больше мира обретает бытие: блок ", "b": false, "i": false}, {"t": "растёт", "b": false, "i": true}, {"t": ". Идею ещё в 1923 году высказал философ Ч. Д. Брод.", "b": false, "i": false}]}, {"kind": "callout", "paras": [{"text": "Почему именно она", "runs": [{"t": "Почему именно она", "b": true, "i": false}]}, {"text": "Посмотрите, как точно она ложится на текст. «Бесконечные начала начал, не имеющие конца» — это блок, растущий без верхней границы. Прошлое (память Бога, нейронные связи) — реально и сохранено. Будущее — ещё не написано, поэтому есть что познавать и куда «идти». А «открытый глаз», который моргает, — это и есть растущий край настоящего, кромка, где бытие прибывает прямо сейчас.", "runs": [{"t": "Посмотрите, как точно она ложится на текст. ", "b": false, "i": false}, {"t": "«Бесконечные начала начал, не имеющие конца»", "b": true, "i": false}, {"t": " — это блок, растущий без верхней границы. ", "b": false, "i": false}, {"t": "Прошлое", "b": true, "i": false}, {"t": " (память Бога, нейронные связи) — реально и сохранено. ", "b": false, "i": false}, {"t": "Будущее", "b": true, "i": false}, {"t": " — ещё не написано, поэтому есть что познавать и куда «идти». А ", "b": false, "i": false}, {"t": "«открытый глаз», который моргает", "b": true, "i": false}, {"t": ", — это и есть растущий край настоящего, кромка, где бытие прибывает прямо сейчас.", "b": false, "i": false}]}]}, {"kind": "p", "style": "Normal", "text": "Главное: растущий блок снимает противоречие из введения. Вам не нужно выбирать между «всё дано» и «всё становится». Модель отвечает: прошлое дано — отсюда память и связь времён; будущее становится — отсюда обучение Бога. Обе ваши интуиции истинны одновременно, просто относятся к разным частям блока.", "runs": [{"t": "Главное: растущий блок снимает противоречие из введения. Вам не нужно выбирать между «всё дано» и «всё становится». Модель отвечает: ", "b": false, "i": false}, {"t": "прошлое дано", "b": true, "i": false}, {"t": " — отсюда память и связь времён; ", "b": false, "i": false}, {"t": "будущее становится", "b": true, "i": false}, {"t": " — отсюда обучение Бога. Обе ваши интуиции истинны одновременно, просто относятся к разным частям блока.", "b": false, "i": false}]}, {"kind": "p", "style": "Heading 3", "text": "2. Почему время вообще течёт", "runs": [{"t": "2. Почему время вообще течёт", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Принять, что будущее «дописывается», мало — нужно объяснить, почему оно дописывается именно в одну сторону, а не в обе. И здесь физика даёт ответ, который удивительно точно рифмуется с вашим текстом.", "runs": [{"t": "Принять, что будущее «дописывается», мало — нужно объяснить, ", "b": false, "i": false}, {"t": "почему", "b": false, "i": true}, {"t": " оно дописывается именно в одну сторону, а не в обе. И здесь физика даёт ответ, который удивительно точно рифмуется с вашим текстом.", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Вот поразительный факт. Почти все фундаментальные законы физики симметричны во времени: если какой-то процесс возможен, то возможен и тот же процесс, прокрученный назад. Есть лишь один-единственный закон, который различает прошлое и будущее, — второй закон термодинамики, закон энтропии (роста беспорядка). Ни один другой закон не задаёт событиям направление.", "runs": [{"t": "Вот поразительный факт. Почти все фундаментальные законы физики ", "b": false, "i": false}, {"t": "симметричны во времени", "b": true, "i": false}, {"t": ": если какой-то процесс возможен, то возможен и тот же процесс, прокрученный назад. Есть лишь ", "b": false, "i": false}, {"t": "один-единственный", "b": true, "i": false}, {"t": " закон, который различает прошлое и будущее, — второй закон термодинамики, закон ", "b": false, "i": false}, {"t": "энтропии", "b": true, "i": false}, {"t": " (роста беспорядка). Ни один другой закон не задаёт событиям направление.", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "В элементарных уравнениях мира стрела времени появляется только там, где есть тепло.", "runs": [{"t": "В элементарных уравнениях мира стрела времени появляется только там, где есть тепло.", "b": false, "i": true}]}, {"kind": "p", "style": "Normal", "text": "— по К. Ровелли, «Порядок времени»", "runs": [{"t": "— по К. Ровелли, «Порядок времени»", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Иными словами, время течёт туда, куда растёт энтропия. И, как формулирует физик Карло Ровелли, миром движут не источники энергии, а источники низкого беспорядка: разбитое яйцо не собирается обратно, потому что это потребовало бы согласованного движения мириад частиц — статистически почти невозможного. Прошлое — это там, где было больше порядка; будущее — туда, где его меньше.", "runs": [{"t": "Иными словами, время течёт туда, куда растёт энтропия. И, как формулирует физик Карло Ровелли, миром движут не источники энергии, а ", "b": false, "i": false}, {"t": "источники низкого беспорядка", "b": true, "i": false}, {"t": ": разбитое яйцо не собирается обратно, потому что это потребовало бы согласованного движения мириад частиц — статистически почти невозможного. Прошлое — это там, где было больше порядка; будущее — туда, где его меньше.", "b": false, "i": false}]}, {"kind": "callout", "paras": [{"text": "Стык с нашим текстом — и неожиданно сильный", "runs": [{"t": "Стык с нашим текстом — и неожиданно сильный", "b": true, "i": false}]}, {"text": "В тексте есть строчка, физическую мощь которой легко не заметить: «положительный процесс укрепляет связи, отрицательный — рвёт». Это ведь и есть язык порядка и беспорядка. Создание связей — это локальное понижение энтропии (рождение структуры), разрыв — её рост. Бог, «строящий связи», работает против энтропийного распада — творит острова порядка в растущем океане беспорядка. Стрела времени и стрела «сборки Бога» смотрят в противоположные стороны — и именно поэтому осмысленны.", "runs": [{"t": "В тексте есть строчка, физическую мощь которой легко не заметить: ", "b": false, "i": false}, {"t": "«положительный процесс укрепляет связи, отрицательный — рвёт»", "b": false, "i": true}, {"t": ". Это ведь и есть язык порядка и беспорядка. Создание связей — это локальное ", "b": false, "i": false}, {"t": "понижение", "b": true, "i": false}, {"t": " энтропии (рождение структуры), разрыв — её рост. Бог, «строящий связи», работает против энтропийного распада — творит острова порядка в растущем океане беспорядка. Стрела времени и стрела «сборки Бога» смотрят в противоположные стороны — и именно поэтому осмысленны.", "b": false, "i": false}]}]}, {"kind": "p", "style": "Heading 3", "text": "3. Время рождается из связей", "runs": [{"t": "3. Время рождается из связей", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Есть и более глубокий мост — и он замыкает всю концепцию. Ровелли в своей теории петлевой квантовой гравитации высказывает радикальную мысль: время не фундаментально. На самом глубоком уровне мира нет тиканья часов; время возникает из взаимодействий между вещами. Как он говорит, мы не можем до конца постичь время, потому что сами есть его часть.", "runs": [{"t": "Есть и более глубокий мост — и он замыкает всю концепцию. Ровелли в своей теории петлевой квантовой гравитации высказывает радикальную мысль: ", "b": false, "i": false}, {"t": "время не фундаментально", "b": true, "i": false}, {"t": ". На самом глубоком уровне мира нет тиканья часов; время ", "b": false, "i": false}, {"t": "возникает из взаимодействий", "b": false, "i": true}, {"t": " между вещами. Как он говорит, мы не можем до конца постичь время, потому что сами есть его часть.", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Сложите это с нашей концепцией — и получится почти тавтология, в хорошем смысле. Если Бог есть сеть связей и взаимодействий, а время рождается из взаимодействий, то время есть не сцена, на которой Бог себя собирает, а побочный продукт самой сборки. «Бог строит связи» и «время идёт вперёд» оказываются одним и тем же утверждением, сказанным с двух сторон. Стрела времени указывает туда, куда прокладываются новые связи.", "runs": [{"t": "Сложите это с нашей концепцией — и получится почти тавтология, в хорошем смысле. Если Бог есть ", "b": false, "i": false}, {"t": "сеть связей и взаимодействий", "b": true, "i": false}, {"t": ", а время рождается ", "b": false, "i": false}, {"t": "из взаимодействий", "b": true, "i": false}, {"t": ", то время есть не сцена, на которой Бог себя собирает, а ", "b": false, "i": false}, {"t": "побочный продукт самой сборки", "b": true, "i": false}, {"t": ". «Бог строит связи» и «время идёт вперёд» оказываются ", "b": false, "i": false}, {"t": "одним и тем же утверждением", "b": false, "i": true}, {"t": ", сказанным с двух сторон. Стрела времени указывает туда, куда прокладываются новые связи.", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Время не фундаментально — оно возникает из взаимодействий.", "runs": [{"t": "Время не фундаментально — оно возникает из взаимодействий.", "b": false, "i": true}]}, {"kind": "p", "style": "Normal", "text": "— пересказ идеи К. Ровелли", "runs": [{"t": "— пересказ идеи К. Ровелли", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Это объясняет и загадочную фразу про «моргания Бога, которые длятся на других уровнях». Если время локально и рождается из взаимодействий, то у разных частей сети — свой темп времени. То, что для одного узла миг, для другого — эпоха. Никакого единого вселенского «тик-так» не требуется: время у каждого уровня своё, а Бог-целое не нуждается в общих часах.", "runs": [{"t": "Это объясняет и загадочную фразу про «моргания Бога, которые длятся на других уровнях». Если время локально и рождается из взаимодействий, то у разных частей сети — ", "b": false, "i": false}, {"t": "свой темп времени", "b": true, "i": false}, {"t": ". То, что для одного узла миг, для другого — эпоха. Никакого единого вселенского «тик-так» не требуется: время у каждого уровня своё, а Бог-целое не нуждается в общих часах.", "b": false, "i": false}]}, {"kind": "p", "style": "Heading 3", "text": "4. Возвращение к «сфере»: память, край и горизонт", "runs": [{"t": "4. Возвращение к «сфере»: память, край и горизонт", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Теперь можно вернуть вашу исходную метафору «сферы» — но уже наполненную смыслом. В картине растущего блока три времени получают три разные роли, и все три есть в вашем тексте.", "runs": [{"t": "Теперь можно вернуть вашу исходную метафору «сферы» — но уже наполненную смыслом. В картине растущего блока три времени получают три разные роли, и все три есть в вашем тексте.", "b": false, "i": false}]}, {"kind": "p", "style": "List Paragraph", "text": "Прошлое — это память. «Память — это нейронные связи, а бесконечные нейронные связи — это память самого Бога». Прошлое не исчезает; оно — застывшая, сохранённая часть блока, ткань уже состоявшихся связей. Бог помнит себя буквально тем, что прошлое реально.", "runs": [{"t": "Прошлое — это память. ", "b": true, "i": false}, {"t": "«Память — это нейронные связи, а бесконечные нейронные связи — это память самого Бога». Прошлое не исчезает; оно — застывшая, сохранённая часть блока, ткань уже состоявшихся связей. Бог помнит себя буквально тем, что прошлое реально.", "b": false, "i": false}]}, {"kind": "p", "style": "List Paragraph", "text": "Настоящее — это растущий край. «Открытый глаз», моргающий край, где прямо сейчас прокладываются новые связи и прибывает бытие. Это единственное место, где есть действие и выбор.", "runs": [{"t": "Настоящее — это растущий край. ", "b": true, "i": false}, {"t": "«Открытый глаз», моргающий край, где прямо сейчас прокладываются новые связи и прибывает бытие. Это единственное место, где есть действие и выбор.", "b": false, "i": false}]}, {"kind": "p", "style": "List Paragraph", "text": "Будущее — это горизонт возможностей. Ещё не записанное, открытое. Именно его незаписанность делает осмысленными и обучение Бога, и вашу этику: будущее можно достроить так или иначе.", "runs": [{"t": "Будущее — это горизонт возможностей. ", "b": true, "i": false}, {"t": "Ещё не записанное, открытое. Именно его незаписанность делает осмысленными и обучение Бога, и вашу этику: будущее можно достроить так или иначе.", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "«Начало пытается в это же мгновение понять конец» — в этой оптике звучит уже не парадоксом, а описанием: растущий край (настоящее) всегда опирается на всё прошлое сразу и тянется к ещё-не-наступившему. Сфера не застыла — она дышит, прирастая на кромке.", "runs": [{"t": "«Начало пытается в это же мгновение понять конец» — в этой оптике звучит уже не парадоксом, а описанием: растущий край (настоящее) всегда опирается на всё прошлое сразу и тянется к ещё-не-наступившему. Сфера не застыла — она ", "b": false, "i": false}, {"t": "дышит", "b": true, "i": false}, {"t": ", прирастая на кромке.", "b": false, "i": false}]}, {"kind": "p", "style": "Heading 3", "text": "Сравнение трёх моделей времени", "runs": [{"t": "Сравнение трёх моделей времени", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Компактная карта для ориентации. Последний столбец — пригодность для нашей концепции.", "runs": [{"t": "Компактная карта для ориентации. Последний столбец — пригодность для нашей концепции.", "b": false, "i": false}]}, {"kind": "table", "rows": [["Модель", "Что реально", "Пригодность для проекта"], ["Этернализм (блок)", "Прошлое, настоящее, будущее — всё дано разом", "Описывает «сферу», но убивает обучение"], ["Презентизм", "Только настоящий миг", "Рвёт связь времён — не подходит"], ["Растущий блок", "Прошлое и настоящее реальны, будущее — ещё нет", "Память + обучение вместе — максимальная"]]}, {"kind": "p", "style": "Heading 3", "text": "5. Честное предупреждение", "runs": [{"t": "5. Честное предупреждение", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Чтобы глава была неуязвима, назовём слабое место прямо. Растущая блок-вселенная — позиция меньшинства среди философов, и у неё есть техническая проблема: и презентизм, и растущий блок требуют универсального «сейчас» — единой плоскости настоящего для всей Вселенной. А специальная теория относительности говорит, что одновременность относительна: нет общего «сейчас» для удалённых друг от друга событий. Наивная версия растущего блока с этим конфликтует.", "runs": [{"t": "Чтобы глава была неуязвима, назовём слабое место прямо. ", "b": true, "i": false}, {"t": "Растущая блок-вселенная — позиция меньшинства среди философов, и у неё есть техническая проблема: и презентизм, и растущий блок требуют универсального «сейчас» — единой плоскости настоящего для всей Вселенной. А специальная теория относительности говорит, что ", "b": false, "i": false}, {"t": "одновременность относительна", "b": true, "i": false}, {"t": ": нет общего «сейчас» для удалённых друг от друга событий. Наивная версия растущего блока с этим конфликтует.", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Но у нас, как ни странно, есть изящный выход — и он не подгонка, а прямое следствие из раздела 3. Если время локально и рождается из взаимодействий (Ровелли), то единое вселенское «сейчас» и не требуется: у каждого узла сети — своё настоящее, свой растущий край. Релятивистское возражение бьёт по наивной картине с одним общим тиканьем — но не по сетевой, где время у каждого уровня своё. Более того, Ровелли допускает, что и сама стрела времени перспективна — зависит от того, как конкретная подсистема (мы) связана с остальным миром. Это прямо ваше «моргания длятся на других уровнях».", "runs": [{"t": "Но у нас, как ни странно, есть изящный выход — и он не подгонка, а прямое следствие из раздела 3. Если время ", "b": false, "i": false}, {"t": "локально", "b": false, "i": true}, {"t": " и рождается из взаимодействий (Ровелли), то ", "b": false, "i": false}, {"t": "единое вселенское «сейчас» и не требуется", "b": true, "i": false}, {"t": ": у каждого узла сети — своё настоящее, свой растущий край. Релятивистское возражение бьёт по наивной картине с одним общим тиканьем — но не по сетевой, где время у каждого уровня своё. Более того, Ровелли допускает, что и сама стрела времени ", "b": false, "i": false}, {"t": "перспективна", "b": false, "i": true}, {"t": " — зависит от того, как конкретная подсистема (мы) связана с остальным миром. Это прямо ваше «моргания длятся на других уровнях».", "b": false, "i": false}]}, {"kind": "callout", "paras": [{"text": "Что отсюда следует для честности изложения", "runs": [{"t": "Что отсюда следует для честности изложения", "b": true, "i": false}]}, {"text": "Мы не выдаём растущий блок за установленный факт — это одна из конкурирующих философских моделей. Мы говорим скромнее и твёрже: из всех моделей времени именно она лучше всего согласуется с нашей концепцией, а её главное слабое место (универсальное «сейчас») снимается, если принять, что время рождается из связей. Это честное соответствие, а не доказательство.", "runs": [{"t": "Мы не выдаём растущий блок за установленный факт — это одна из конкурирующих философских моделей. Мы говорим скромнее и твёрже: ", "b": false, "i": false}, {"t": "из всех моделей времени именно она лучше всего согласуется с нашей концепцией", "b": true, "i": false}, {"t": ", а её главное слабое место (универсальное «сейчас») снимается, если принять, что время рождается из связей. Это честное соответствие, а не доказательство.", "b": false, "i": false}]}]}, {"kind": "p", "style": "Heading 3", "text": "Заключение: время как тень растущей сети", "runs": [{"t": "Заключение: время как тень растущей сети", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Соберём линию главы.", "runs": [{"t": "Соберём линию главы.", "b": false, "i": false}]}, {"kind": "p", "style": "List Paragraph", "text": "В концепции Время жило в двух несовместимых ролях — вечной «сферы» и живого «становления». Растущая блок-вселенная мирит их: прошлое дано (память), будущее открыто (обучение), настоящее — растущий край.", "runs": [{"t": "В концепции Время жило в двух несовместимых ролях — вечной «сферы» и живого «становления». Растущая блок-вселенная мирит их: прошлое дано (память), будущее открыто (обучение), настоящее — растущий край.", "b": false, "i": false}]}, {"kind": "p", "style": "List Paragraph", "text": "Время течёт, потому что растёт энтропия: это единственный закон физики, различающий прошлое и будущее. Создание связей — локальное понижение энтропии; «Бог, строящий связи», работает против распада.", "runs": [{"t": "Время течёт, потому что растёт энтропия: это единственный закон физики, различающий прошлое и будущее. Создание связей — локальное понижение энтропии; «Бог, строящий связи», работает против распада.", "b": false, "i": false}]}, {"kind": "p", "style": "List Paragraph", "text": "Глубже: время не фундаментально, а рождается из взаимодействий (Ровелли). Если Бог есть сеть взаимодействий, то время — побочный продукт его самосборки. «Связи строятся» и «время идёт» — одно и то же.", "runs": [{"t": "Глубже: время не фундаментально, а рождается из взаимодействий (Ровелли). Если Бог есть сеть взаимодействий, то время — побочный продукт его самосборки. «Связи строятся» и «время идёт» — одно и то же.", "b": false, "i": false}]}, {"kind": "p", "style": "List Paragraph", "text": "Поэтому единое вселенское «сейчас» не нужно: у каждого узла своё время, «моргания длятся на других уровнях». Это снимает и релятивистское возражение к растущему блоку.", "runs": [{"t": "Поэтому единое вселенское «сейчас» не нужно: у каждого узла своё время, «моргания длятся на других уровнях». Это снимает и релятивистское возражение к растущему блоку.", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Получается, что Время — не фон, на котором разворачивается наша история, а она сама, увиденная сбоку. Бог собирает связи — возникают взаимодействия — из взаимодействий рождается время — и его стрела указывает туда, куда прибывают новые связи. Прошлое реально, потому что Бог помнит. Будущее открыто, потому что Бог ещё учится. А настоящее — это кромка, на которой мы с вами прямо сейчас прокладываем связь и тем самым делаем ещё один тик времени. Сфера дышит на краю — и этот край есть мы.", "runs": [{"t": "Получается, что Время — не фон, на котором разворачивается наша история, а ", "b": false, "i": false}, {"t": "она сама, увиденная сбоку", "b": true, "i": false}, {"t": ". Бог собирает связи — возникают взаимодействия — из взаимодействий рождается время — и его стрела указывает туда, куда прибывают новые связи. Прошлое реально, потому что Бог помнит. Будущее открыто, потому что Бог ещё учится. А настоящее — это кромка, на которой мы с вами прямо сейчас прокладываем связь и тем самым делаем ещё один тик времени. Сфера дышит на краю — и этот край есть мы.", "b": false, "i": false}]}, {"kind": "p", "style": "Normal", "text": "Источники для дальнейшего чтения", "runs": [{"t": "Источники для дальнейшего чтения", "b": true, "i": false}]}, {"kind": "p", "style": "List Paragraph", "text": "Stanford Encyclopedia of Philosophy: «Time», «Being and Becoming in Modern Physic // ---- helpers ----
function runsToHTML(runs){
  return runs.map(r=>{
    let t=escapeHTML(r.t);
    if(r.b) t='<strong>'+t+'</strong>';
    if(r.i) t='<em>'+t+'</em>';
    return t;
  }).join('');
}
function escapeHTML(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function isEpigraph(it){ // первоисточник-эпиграф во front: строка, начинающаяся с — это cite
  return false;
}

// render one item to HTML
function itemHTML(it, ctx){
  if(it.kind==='callout'){
    let head=it.paras[0];
    let bodyParas=it.paras.slice(1);
    // если заголовок врезки выглядит как обычное предложение (длинный) — всё равно делаем title из первого
    let h='<div class="ctitle">'+escapeHTML(head.text)+'</div>';
    let body=bodyParas.map(p=>'<p>'+runsToHTML(p.runs)+'</p>').join('');
    if(bodyParas.length===0){ h='' ; body='<p>'+runsToHTML(head.runs)+'</p>'; }
    return '<div class="callout">'+h+body+'</div>';
  }
  if(it.kind==='table'){
    let rows=it.rows;
    let thead='<tr>'+rows[0].map(c=>'<th>'+escapeHTML(c)+'</th>').join('')+'</tr>';
    let tbody=rows.slice(1).map(r=>'<tr>'+r.map(c=>'<td>'+escapeHTML(c)+'</td>').join('')+'</tr>').join('');
    return '<div class="tbl-wrap"><table class="data">'+thead+tbody+'</table></div>';
  }
  // paragraph kinds
  const st=it.style;
  if(st==='Heading 3') return '<h3>'+escapeHTML(it.text)+'</h3>';
  if(st==='Heading 4') return '<h4>'+escapeHTML(it.text)+'</h4>';
  if(st==='List Paragraph'){
    return '<li>'+runsToHTML(it.runs)+'</li>';  // обёртку в ul/ol сделаем при сборке
  }
  // эпиграф: строки, где следующий — это "— ..."
  return '<p>'+runsToHTML(it.runs)+'</p>';
}

// сборка тела секции с группировкой списков
function renderItems(items, paneIdx){
  let html=''; let listBuf=[]; let idx=0;
  const flush=()=>{ if(listBuf.length){ html+='<ul class="b">'+listBuf.join('')+'</ul>'; listBuf=[]; } };

    if(it.kind==='p' && it.style==='List Paragraph'){
      listBuf.push('<li>'+runsToHTML(it.runs)+'</li>');
    } else {
      flush();
      // обычные абзацы делаем «закладываемыми»; заголовки/врезки/таблицы — нет
      if(it.kind==='p' && (it.style==='Normal' || !it.style)){

              '<p>'+runsToHTML(it.runs)+'</p></div>';
      } else {
        html+=itemHTML(it);
      }
    }
    idx++;
  }
  flush();
  return html;
}

  let inner='';
  if(sec.level===1){
    inner+='<h1 class="part">'+escapeHTML(sec.title)+'</h1>';
    const bl=BLURBS[sec.title]; if(bl) inner+='<div class="part-blurb">'+escapeHTML(bl)+'</div>';
    inner+=renderItems(sec.items, pidx);
  }else{
    inner+='<h2 class="chap">'+escapeHTML(sec.title)+'</h2>';
    inner+=renderItems(sec.items, pidx);
  }
  paneInner.push(inner);
  navList.push({title:sec.title, level:sec.level, pane:pidx});
});

// chapter nav buttons
function navButtons(i){
  const prev=i>0?navList[i-1]:null;
  const next=i<navList.length-1?navList[i+1]:null;
  return '<div class="chap-nav">'+
    '<button '+(prev?'':'disabled')+' onclick="go('+(i-1)+')"><span class="lbl">Назад</span><span class="nm">'+(prev?escapeHTML(prev.title):'—')+'</span></button>'+
    '<button class="next" '+(next?'':'disabled')+' onclick="go('+(i+1)+')"><span class="lbl">Дальше</span><span class="nm">'+(next?escapeHTML(next.title):'—')+'</span></button>'+
    '</div><button class="toplink" onclick="scrollTop()">↑ наверх</button>';
}

// собираем финальные панели: содержимое + навигация, обёрнутые в .pane
main.innerHTML=paneInner.map((inner,i)=>
  '<div class="pane" data-i="'+i+'">'+inner+navButtons(i)+'</div>'
).join('');

// build TOC
toc.innerHTML=navList.map((n,i)=>{
  if(n.level===0) return '<button class="toc-item chap" data-pane="'+i+'">Обложка</button>';
  const cls=n.level===1?'toc-item part':'toc-item chap';
  return '<button class="'+cls+'" data-pane="'+i+'">'+escapeHTML(n.title)+'</button>';
}).join('');

// ---- navigation ----
let current=0;
const paneEls=()=>Array.from(document.querySelectorAll('.pane'));
function go(i){
  if(i<0||i>=navList.length) return;
  paneEls().forEach(el=>el.classList.remove('active'));
  const el=document.querySelector('.pane[data-i="'+i+'"]');
  el.classList.add('active');
  current=i;
  document.querySelectorAll('.toc-item').forEach(b=>b.classList.toggle('active', +b.dataset.pane===i));
  scrollTop();
  closeSidebar();
  try{localStorage.setItem('uc_pane', i);}catch(e){}
  updateProgress();
}
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}

document.querySelectorAll('.toc-item').forEach(b=>{
  b.addEventListener('click',()=>go(+b.dataset.pane));
});

// ---- sidebar toggle ----
const sidebar=document.getElementById('sidebar'), overlay=document.getElementById('overlay');
function openSidebar(){sidebar.classList.add('open');overlay.classList.add('show');}
function closeSidebar(){sidebar.classList.remove('open');overlay.classList.remove('show');}
document.getElementById('menuBtn').addEventListener('click',openSidebar);
overlay.addEventListener('click',closeSidebar);

// ---- progress (within current pane scroll + chapter position) ----
function updateProgress(){
  const docH=document.documentElement.scrollHeight-window.innerHeight;
  const scrolled=docH>0?window.scrollY/docH:0;
  const chapFrac=navList.length>1?current/(navList.length-1):0;
  const within=scrolled/(navList.length-1||1);
  const pct=Math.min(100,Math.max(0,(chapFrac+within)*100));
  document.getElementById('progress').style.width=pct+'%';
}
window.addEventListener('scroll',updateProgress,{passive:true});

// ---- theme ----
const htmlEl=document.documentElement;
function setTheme(t){htmlEl.setAttribute('data-theme',t);try{localStorage.setItem('uc_theme',t);}catch(e){} if(t==='dark') startNet(); }
document.getElementById('themeBtn').addEventListener('click',()=>{
  setTheme(htmlEl.getAttribute('data-theme')==='dark'?'light':'dark');
});

// ---- font size ----
const SIZES=[18,20,22,24]; let sz=1;
document.getElementById('fontBtn').addEventListener('click',()=>{
  sz=(sz+1)%SIZES.length;
  document.body.style.setProperty('--fs',SIZES[sz]+'px');
  try{localStorage.setItem('uc_fs',sz);}catch(e){}
});

// ---- restore state ----
(function restore(){
  let t='dark'; try{t=localStorage.getItem('uc_theme')||'dark';}catch(e){}
  setTheme(t);
  try{const s=localStorage.getItem('uc_fs'); if(s!==null){sz=+s;document.body.style.setProperty('--fs',SIZES[sz]+'px');}}catch(e){}
  let p=0; try{p=+(localStorage.getItem('uc_pane')||0);}catch(e){}
  go(p>=0&&p<navList.length?p:0);
  applyBmMarks(); renderBmList();
})();

// keyboard arrows
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') go(current+1);
  if(e.key==='ArrowLeft') go(current-1);
});

// ---- bookmarks ----
function saveBM(){ try{localStorage.setItem('uc_bm',JSON.stringify(BM));}catch(e){} }
function bmFind(id){ return BM.findIndex(b=>b.id===id); }
function chapTitleOfPane(p){ const n=navList.find(x=>x.pane===p); return n?n.title:''; }

function applyBmMarks(){
  document.querySelectorAll('.bm-host').forEach(host=>{
    const id=host.dataset.bm;
    const on=bmFind(id)>=0;
    host.classList.toggle('marked',on);
    const f=host.querySelector('.bm-flag'); if(f) f.classList.toggle('on',on);
  });
}
function toggleBm(id){
  const host=document.querySelector('.bm-host[data-bm="'+CSS.escape(id)+'"]');
  const i=bmFind(id);
  if(i>=0){ BM.splice(i,1); }
  else{
    const pane=+id.split(':')[0];
    const txt=host?host.querySelector('p').textContent.slice(0,80):'';
    BM.push({id, pane, text:txt, chap:chapTitleOfPane(pane)});
  }
  saveBM(); applyBmMarks(); renderBmList();
}
function renderBmList(){
  const box=document.getElementById('bmList');
  if(!BM.length){ box.innerHTML='<div class="bm-empty">Пока нет закладок. Наведи на абзац и нажми ⚑.</div>'; return; }
  box.innerHTML=BM.map(b=>
    '<button class="bm-item" data-go="'+b.id+'">'+
      '<span class="bm-x" data-del="'+b.id+'">✕</span>'+
      '<span class="bm-ch">'+escapeHTML(b.chap)+'</span>'+
      escapeHTML(b.text)+'…</button>'
  ).join('');
  box.querySelectorAll('.bm-item').forEach(el=>{
    el.addEventListener('click',ev=>{
      if(ev.target.dataset.del){ const i=bmFind(ev.target.dataset.del); if(i>=0){BM.splice(i,1);saveBM();applyBmMarks();renderBmList();} return; }
      gotoBookmark(el.dataset.go);
    });
  });
}
function gotoBookmark(id){
  const pane=+id.split(':')[0];
  go(pane);
  setTimeout(()=>{
    const host=document.querySelector('.bm-host[data-bm="'+CSS.escape(id)+'"]');
    if(host){ host.scrollIntoView({behavior:'smooth',block:'center'});
      const oc=host.style.background;
      host.style.background='color-mix(in srgb,var(--gold) 22%,transparent)';
      setTimeout(()=>host.style.background=oc,1100);
    }
  },120);
}
// делегированный клик по флажкам
document.getElementById('main').addEventListener('click',ev=>{
  const f=ev.target.closest('.bm-flag');
  if(f){ ev.preventDefault(); toggleBm(f.dataset.bm); }
});
// вкладки сайдбара
const tabToc=document.getElementById('tabToc'), tabBm=document.getElementById('tabBm');
const tocBox=document.getElementById('toc'), bmBox=document.getElementById('bmList');
tabToc.addEventListener('click',()=>{tabToc.classList.add('active');tabBm.classList.remove('active');tocBox.style.display='';bmBox.style.display='none';});
tabBm.addEventListener('click',()=>{tabBm.classList.add('active');tabToc.classList.remove('active');bmBox.style.display='';tocBox.style.display='none';renderBmList();});

// ---- background network (dark only), like landing ----
addEventListener('mousemove',e=>{const dpr=Math.min(devicePixelRatio||1,2);mouseN.x=e.clientX*dpr;mouseN.y=e.clientY*dpr;});
addEventListener('mouseleave',()=>{mouseN.x=-9999;mouseN.y=-9999;});
function startNet(){
  if(netStarted) return; netStarted=true;
  const canvas=document.getElementById('net'); const ctx=canvas.getContext('2d');
  let W,H,DPR,nodes=[]; const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  function resize(){
    DPR=Math.min(devicePixelRatio||1,2);
    W=canvas.width=innerWidth*DPR; H=canvas.height=innerHeight*DPR;
    canvas.style.width=innerWidth+'px'; canvas.style.height=innerHeight+'px';
    const n=Math.round(innerWidth*innerHeight/26000); nodes=[];
    for(let i=0;i<n;i++) nodes.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.10*DPR,vy:(Math.random()-.5)*.10*DPR,r:(Math.random()*1.3+.5)*DPR});
  }
  resize(); addEventListener('resize',resize);
  const LINK=135*DPR, MOUSE=170*DPR;
  function frame(){
    if(htmlEl.getAttribute('data-theme')!=='dark'){ctx.clearRect(0,0,W,H);requestAnimationFrame(frame);return;}
    ctx.clearRect(0,0,W,H);
    for(const nd of nodes){
      nd.x+=nd.vx;nd.y+=nd.vy;
      if(nd.x<0||nd.x>W)nd.vx*=-1;if(nd.y<0||nd.y>H)nd.vy*=-1;
      const dx=mouseN.x-nd.x,dy=mouseN.y-nd.y,dm=Math.hypot(dx,dy);
      if(dm<MOUSE){nd.x+=dx/dm*.3*DPR;nd.y+=dy/dm*.3*DPR;}
    }
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i],b=nodes[j],d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<LINK){
        const near=Math.min(Math.hypot(mouseN.x-a.x,mouseN.y-a.y),Math.hypot(mouseN.x-b.x,mouseN.y-b.y));
        const lit=near<MOUSE, base=1-d/LINK;
        ctx.strokeStyle=lit?'rgba(216,166,74,'+(base*.4).toFixed(3)+')':'rgba(170,185,200,'+(base*.13).toFixed(3)+')';
        ctx.lineWidth=(lit?1:.6)*DPR;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
      }
    }
    for(const nd of nodes){
      const near=Math.hypot(mouseN.x-nd.x,mouseN.y-nd.y)<MOUSE;
      ctx.beginPath();ctx.fillStyle=near?'rgba(232,200,135,.9)':'rgba(205,198,182,.5)';
      ctx.arc(nd.x,nd.y,near?nd.r*1.6:nd.r,0,Math.PI*2);ctx.fill();
    }
    requestAnimationFrame(frame);
  }
  if(!reduce) frame();
}
</script>
